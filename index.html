<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carregando...</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111b21;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e9edef;
      text-align: center;
    }
    .box { padding: 24px; }
    .spinner {
      width: 36px;
      height: 36px;
      margin: 0 auto 16px;
      border: 4px solid rgba(233, 237, 239, 0.2);
      border-top-color: #25d366;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .counter {
      font-size: 28px;
      font-weight: 700;
      color: #25d366;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>Carregando...</p>
    <div class="counter" id="counter">3</div>
  </div>

  <script>
    var segundos = 3;
    var contador = document.getElementById("counter");

    var intervalo = setInterval(function () {
      segundos -= 1;
      if (segundos > 0) {
        contador.textContent = segundos;
      } else {
        clearInterval(intervalo);
        window.location.href = "go/";
      }
    }, 1000);
  </script>
</body>
</html>
